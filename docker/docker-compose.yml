services:
  brain-db:
    image: timescale/timescaledb-ha:pg16
    container_name: brain-db
    restart: unless-stopped
    ports:
      - "${BRAIN_DB_BIND:-127.0.0.1}:${BRAIN_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${BRAIN_DB_USER:-brain}
      POSTGRES_PASSWORD: ${BRAIN_DB_PASSWORD:?Set BRAIN_DB_PASSWORD in .env}
      POSTGRES_DB: ${BRAIN_DB_NAME:-brain}
    volumes:
      - brain-data:/home/postgres/pgdata/data
      - ./init:/docker-entrypoint-initdb.d

volumes:
  brain-data:
